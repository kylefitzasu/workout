<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12-Week Tone &amp; Sculpt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f7f5f0; color: #1a1a1a; min-height: 100vh; }
    button { font-family: Georgia, serif; cursor: pointer; }

    /* Header */
    #header { background: #1a1a1a; color: #f7f5f0; padding: 32px 24px 28px; text-align: center; border-bottom: 4px solid #7EB8A4; }
    #header .eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #aaa; margin-bottom: 8px; }
    #header h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; }
    #header .subtitle { margin-top: 10px; font-size: 13px; color: #bbb; letter-spacing: 1px; }

    /* Phase Tabs */
    #phase-tabs { display: flex; border-bottom: 2px solid #e0ddd8; }
    .phase-tab { flex: 1; padding: 16px 8px; border: none; background: #f7f5f0; border-bottom: 3px solid transparent; font-size: 13px; font-weight: 400; color: #777; transition: all 0.2s; }
    .phase-tab .phase-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .phase-tab .phase-sub { font-size: 11px; color: #999; margin-top: 2px; }
    .phase-tab.active { font-weight: 700; color: #1a1a1a; }

    /* Phase Focus */
    #phase-focus { padding: 16px 20px; border-bottom: 1px solid #e0ddd8; }
    #phase-focus .focus-label { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    #phase-focus .focus-text { font-size: 14px; margin-top: 4px; color: #444; }

    /* Week Selector */
    #week-selector { display: flex; gap: 8px; padding: 14px 16px; background: #fff; border-bottom: 1px solid #e8e5e0; overflow-x: auto; }
    .week-btn { min-width: 72px; padding: 8px 4px; border-radius: 6px; font-size: 13px; font-weight: 400; color: #555; transition: all 0.2s; text-align: center; }
    .week-btn .deload-label { font-size: 10px; margin-top: 2px; }

    /* Content */
    #content { padding: 16px; }

    /* Day Tabs */
    #day-tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
    .day-btn { padding: 8px 10px; border-radius: 6px; font-size: 12px; font-weight: 400; color: #555; white-space: nowrap; transition: all 0.2s; }

    /* Day Detail Card */
    #day-card { background: #fff; border-radius: 10px; border: 1px solid #e8e5e0; overflow: hidden; }
    #day-header { padding: 16px 18px; background: #1a1a1a; color: #fff; }
    #day-header .day-name { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
    #day-header .day-label { font-size: 18px; font-weight: 700; margin-top: 4px; }
    #day-header .day-cardio { margin-top: 8px; font-size: 13px; color: #ccc; display: flex; align-items: center; gap: 6px; }

    /* Exercise Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #f7f5f0; border-bottom: 1px solid #e0ddd8; }
    th { padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #888; }
    tbody tr { border-bottom: 1px solid #f0ede8; }
    tbody tr:nth-child(even) { background: #fdfcfb; }
    td { padding: 11px 12px; }
    td.ex-name { font-weight: 600; color: #1a1a1a; }
    td.ex-name.sub { font-weight: 400; color: #555; padding-left: 22px; }
    td.ex-name.header-row { font-weight: 400; }
    td.ex-sets { color: #555; }
    td.ex-reps { font-weight: 600; }
    td.ex-notes { color: #777; font-size: 12px; font-style: italic; }

    /* Week Note Card */
    #week-note { background: #fff; border-radius: 10px; padding: 20px; }
    #week-note .note-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    #week-note p { font-size: 14px; line-height: 1.7; color: #444; }

    /* Tips */
    #tips { margin-top: 24px; }
    #tips .tips-heading { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #999; margin-bottom: 12px; }
    #tips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .tip-card { background: #fff; border-radius: 8px; border: 1px solid #e8e5e0; padding: 12px 14px; }
    .tip-icon { font-size: 18px; margin-bottom: 4px; }
    .tip-title { font-size: 12px; font-weight: 700; margin-bottom: 4px; color: #1a1a1a; }
    .tip-text { font-size: 11px; color: #666; line-height: 1.6; }

    /* Footer */
    #footer { text-align: center; padding: 24px 0 8px; font-size: 11px; color: #bbb; letter-spacing: 1px; }
  </style>
</head>

let activePhase = 0;
let activeWeek = 0;
let activeDay = 0;

function isDeload(weekNum) { return weekNum === 4 || weekNum === 8 || weekNum === 12; }

function render() {
  const phase = programData.phases[activePhase];
  const weekData = phase.weeks_data[activeWeek];
  const hasDetailed = weekData && weekData.days;

  // Header border
  document.getElementById('header').style.borderBottomColor = phase.color;

  // Phase Tabs
  const phaseTabs = document.getElementById('phase-tabs');
  phaseTabs.innerHTML = programData.phases.map((p, i) => `
    <button class="phase-tab ${activePhase === i ? 'active' : ''}"
      style="border-bottom-color: ${activePhase === i ? p.color : 'transparent'}; background: ${activePhase === i ? p.bg : '#f7f5f0'};"
      onclick="selectPhase(${i})">
      <div class="phase-label" style="color: ${p.color}">Phase ${p.phase}</div>
      <div>${p.name}</div>
      <div class="phase-sub">Wks ${p.weeks}</div>
    </button>
  `).join('');

  // Phase Focus
  const focusEl = document.getElementById('phase-focus');
  focusEl.style.background = phase.bg;
  focusEl.querySelector('.focus-label').style.color = phase.color;
  focusEl.querySelector('.focus-label').textContent = 'Focus';
  focusEl.querySelector('.focus-text').textContent = phase.focus;

  // Week Selector
  const weekSel = document.getElementById('week-selector');
  weekSel.innerHTML = phase.weeks_data.map((w, i) => `
    <button class="week-btn ${activeWeek === i ? 'active' : ''}"
      style="border: 1.5px solid ${activeWeek === i ? phase.color : '#ddd'}; background: ${activeWeek === i ? phase.color : '#fff'}; color: ${activeWeek === i ? '#fff' : '#555'};"
      onclick="selectWeek(${i})">
      ${isDeload(w.week) ? '⭐ ' : ''}Week ${w.week}
      ${isDeload(w.week) ? '<div class="deload-label">Deload</div>' : ''}
    </button>
  `).join('');

  // Content
  const dayTabsEl = document.getElementById('day-tabs');
  const dayCard = document.getElementById('day-card');
  const weekNote = document.getElementById('week-note');

  if (hasDetailed) {
    dayCard.style.display = 'block';
    weekNote.style.display = 'none';

    // Day tabs
    dayTabsEl.innerHTML = weekData.days.map((d, i) => `
      <button class="day-btn ${activeDay === i ? 'active' : ''}"
        style="border: 1.5px solid ${activeDay === i ? phase.color : '#ddd'}; background: ${activeDay === i ? phase.color : '#fff'}; color: ${activeDay === i ? '#fff' : '#555'}; font-weight: ${activeDay === i ? '700' : '400'};"
        onclick="selectDay(${i})">${d.day}</button>
    `).join('');

    // Day detail
    const day = weekData.days[activeDay];
    const hdr = document.getElementById('day-header');
    hdr.querySelector('.day-name').style.color = phase.color;
    hdr.querySelector('.day-name').textContent = day.day;
    hdr.querySelector('.day-label').textContent = day.label;
    const cardioEl = hdr.querySelector('.day-cardio');
    if (day.cardio && day.cardio !== '—') {
      cardioEl.innerHTML = `<span style="color:${phase.color}">🚴</span> ${day.cardio}`;
      cardioEl.style.display = 'flex';
    } else {
      cardioEl.style.display = 'none';
    }

    // Exercises
    const tbody = document.getElementById('exercise-tbody');
    tbody.innerHTML = day.exercises.map((ex, i) => {
      const isSub = ex.name.startsWith('→');
      const isHeaderRow = ex.name.startsWith('Circuit') || ex.name.startsWith('Superset') || ex.name.startsWith('Full') || ex.name.startsWith('Plank Circuit');
      const nameClass = isSub ? 'ex-name sub' : isHeaderRow ? 'ex-name header-row' : 'ex-name';
      return `<tr style="background: ${i % 2 === 0 ? '#fff' : '#fdfcfb'}">
        <td class="${nameClass}">${ex.name}</td>
        <td class="ex-sets">${ex.sets}</td>
        <td class="ex-reps" style="color:${phase.color}">${ex.reps}</td>
        <td class="ex-notes">${ex.notes}</td>
      </tr>`;
    }).join('');
  } else {
    dayCard.style.display = 'none';
    dayTabsEl.innerHTML = '';
    weekNote.style.display = 'block';
    weekNote.style.border = `1.5px solid ${phase.color}`;
    weekNote.querySelector('.note-label').style.color = phase.color;
    weekNote.querySelector('.note-label').textContent = `Week ${weekData.week} — Progression Notes`;
    weekNote.querySelector('p').textContent = weekData.note;
  }

  // Tips
  document.getElementById('tips-grid').innerHTML = programData.tips.map(t => `
    <div class="tip-card">
      <div class="tip-icon">${t.icon}</div>
      <div class="tip-title">${t.title}</div>
      <div class="tip-text">${t.text}</div>
    </div>
  `).join('');
}

function selectPhase(i) { activePhase = i; activeWeek = 0; activeDay = 0; render(); }
function selectWeek(i) { activeWeek = i; activeDay = 0; render(); }
function selectDay(i) { activeDay = i; render(); }

render();
</script>
</body>
</html>
