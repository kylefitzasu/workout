<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>12-Week Home Strength & Toning Plan</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e8e8f0;
    font-family: 'Georgia','Times New Roman',serif;
  }
  button { font-family: monospace; cursor: pointer; border: none; }

  /* Header */
  #header {
    background: linear-gradient(135deg,#0f0f1a,#1a1025);
    border-bottom: 1px solid #2a2a3a;
    padding: 28px 24px 20px;
    position: relative;
    overflow: hidden;
  }
  #header-bg {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(74,222,128,.06), transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(248,113,113,.05), transparent 50%);
  }
  #header-content { position: relative; }
  #header-eyebrow {
    font-size: 11px; letter-spacing: 4px; color: #555;
    text-transform: uppercase; margin-bottom: 6px; font-family: monospace;
  }
  #header h1 { font-size: 26px; font-weight: 400; color: #f0f0ff; line-height: 1.15; }
  #header h1 em { font-style: italic; }
  #header-stats { margin-top: 10px; display: flex; gap: 16px; }
  .stat { display: flex; gap: 5px; align-items: center; }
  .stat-label { font-size: 10px; color: #444; font-family: monospace; letter-spacing: 1.5px; }
  .stat-val { font-size: 12px; color: #888; font-family: monospace; }

  /* Week bar */
  #week-bar {
    background: #0d0d16;
    border-bottom: 1px solid #1e1e2e;
    padding: 10px 20px;
    display: flex; gap: 6px;
    overflow-x: auto;
  }
  .week-cell {
    flex: 0 0 auto; text-align: center;
    padding: 6px 9px; border-radius: 6px;
    font-family: monospace;
  }
  .week-label { font-size: 9px; color: #3a3a4a; letter-spacing: 1px; }
  .week-type { font-size: 11px; color: #aaa; margin-top: 2px; }

  /* Phase tabs */
  #phase-tabs {
    padding: 14px 20px 0;
    display: flex; gap: 8px;
  }
  .phase-tab {
    flex: 1; padding: 10px 6px;
    border-radius: 8px;
    font-size: 10px; font-weight: 400;
    transition: all .2s;
    border-top: 2px solid #1e1e2e;
    background: #111118; color: #555;
  }
  .phase-tab.active { font-weight: 700; color: #000; }
  .phase-tab-num { font-weight: 700; }
  .phase-tab-wk { opacity: .75; margin-top: 1px; }
  .phase-tab-lbl { font-size: 9px; margin-top: 2px; }

  /* Focus bar */
  #focus-bar { padding: 10px 20px 0; }
  #focus-inner {
    background: #0d0d16;
    border-left: 3px solid #4ade80;
    border-radius: 8px;
    padding: 9px 13px;
  }
  .focus-key { font-size: 9px; font-family: monospace; letter-spacing: 2px; }
  .focus-val { font-size: 12px; color: #888; }

  /* Day tabs */
  #day-tabs { padding: 10px 20px 0; display: flex; gap: 6px; }
  .day-tab {
    flex: 1; padding: 7px 4px;
    border-radius: 8px;
    font-size: 10px;
    transition: all .2s;
    background: #0d0d16; color: #555;
  }
  .day-tab.active { }
  .day-tab-name { font-weight: 700; }
  .day-tab-sub { font-size: 9px; opacity: .7; margin-top: 1px; }

  /* Day content */
  #day-content { padding: 14px 20px 36px; }
  #day-header { margin-bottom: 12px; }
  #day-header h2 { font-size: 18px; font-weight: 400; color: #e8e8f0; margin-bottom: 2px; }
  #day-header h2 em { }
  #day-header-sub {
    font-size: 10px; color: #444;
    font-family: monospace; letter-spacing: 1px; margin-bottom: 7px;
  }
  #day-equipment { display: flex; flex-wrap: wrap; gap: 5px; }
  .eq-tag {
    font-size: 10px; color: #555;
    border: 1px solid #1e1e2e; border-radius: 4px;
    padding: 2px 7px; font-family: monospace;
  }
  #exercise-list { display: flex; flex-direction: column; gap: 6px; margin-top: 0; }
  .ex-row {
    background: #111118;
    border-radius: 8px;
    padding: 10px 13px;
    border: 1px solid #1a1a28;
    border-left: 2px solid #1e1e2e;
  }
  .ex-row.tappable { cursor: pointer; }
  .ex-row.header-row { background: transparent; border: none; padding: 8px 0 3px; }
  .ex-row.circuit-row { background: #0d0d16; }
  .ex-header-label { font-size: 10px; font-family: monospace; letter-spacing: 2px; }
  .ex-inner { display: flex; align-items: flex-start; gap: 10px; }
  .ex-name { flex: 1; }
  .ex-name-text { font-size: 13px; font-weight: 600; color: #ddd; line-height: 1.3; }
  .ex-name-text.circuit { font-weight: 400; color: #888; }
  .guide-badge { margin-left: 6px; font-size: 9px; opacity: .6; font-family: monospace; }
  .ex-notes { font-size: 11px; color: #4a4a5a; margin-top: 2px; }
  .ex-meta { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
  .meta-block { text-align: center; }
  .meta-val { font-size: 15px; font-family: monospace; font-weight: 700; }
  .meta-rep { font-size: 12px; font-family: monospace; font-weight: 600; color: #888; }
  .meta-lbl { font-size: 8px; color: #3a3a4a; letter-spacing: 1px; }

  /* Injury notes */
  #injury-toggle {
    width: 100%; margin-top: 18px;
    padding: 11px 14px;
    background: #0d0d16;
    border: 1px dashed #252535;
    border-radius: 10px; color: #555;
    font-size: 10px; letter-spacing: 1.5px;
    text-align: left;
    display: flex; justify-content: space-between;
  }
  #injury-notes {
    background: #0d0d16;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 13px 15px; margin-top: 3px;
    display: none;
  }
  .injury-note { display: flex; gap: 9px; margin-bottom: 9px; }
  .injury-note:last-child { margin-bottom: 0; }
  .injury-arrow { color: #f59e0b; flex-shrink: 0; }
  .injury-text { font-size: 12px; color: #777; line-height: 1.5; }

  /* Modal overlay */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(8px);
    align-items: flex-end; justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal-panel {
    width: 100%; max-width: 560px;
    background: #0f0f1a;
    border-top: 2px solid #4ade80;
    border-radius: 20px 20px 0 0;
    max-height: 90vh;
    overflow-y: auto;
    padding: 18px 20px 40px;
  }
  #modal-drag { width: 36px; height: 4px; background: #2a2a3a; border-radius: 2px; margin: 0 auto 18px; }
  #modal-top { display: flex; gap: 14px; align-items: center; margin-bottom: 20px; }
  #modal-anim-box {
    width: 96px; height: 96px; flex-shrink: 0;
    background: #0a0a14; border-radius: 14px;
    border: 1px solid rgba(74,222,128,.2);
    display: flex; align-items: center; justify-content: center;
  }
  #modal-anim-box svg { width: 100px; height: 100px; }
  #modal-eyebrow { font-size: 10px; font-family: monospace; letter-spacing: 2px; margin-bottom: 4px; }
  #modal-title { font-size: 16px; font-weight: 700; color: #f0f0ff; line-height: 1.25; }
  #modal-sets { font-size: 11px; color: #555; margin-top: 5px; font-family: monospace; }
  #modal-exnotes { font-size: 11px; color: #666; margin-top: 4px; font-style: italic; }
  #modal-body { display: flex; flex-direction: column; gap: 14px; }

  .modal-section-label {
    font-size: 9px; color: #444; font-family: monospace; letter-spacing: 2px; margin-bottom: 7px;
  }
  .muscle-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .muscle-tag {
    font-size: 12px; padding: 4px 12px; border-radius: 20px;
    border: 1px solid;
  }
  .setup-box {
    background: #111120; border-radius: 10px;
    padding: 12px 14px; border-left: 3px solid;
  }
  .setup-text { font-size: 13px; color: #bbb; line-height: 1.55; }
  .steps-list { display: flex; flex-direction: column; gap: 8px; }
  .step-row { display: flex; gap: 10px; }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-family: monospace; font-weight: 700;
    border: 1px solid;
  }
  .step-text { font-size: 13px; color: #bbb; line-height: 1.55; padding-top: 4px; }
  .form-box, .avoid-box {
    background: #111120; border-radius: 10px; padding: 12px 14px;
  }
  .form-row, .avoid-row { display: flex; gap: 8px; margin-bottom: 7px; }
  .form-row:last-child, .avoid-row:last-child { margin-bottom: 0; }
  .check-icon { font-size: 14px; flex-shrink: 0; }
  .x-icon { font-size: 14px; color: #f87171; flex-shrink: 0; }
  .cue-text { font-size: 13px; color: #aaa; line-height: 1.5; }
  .injury-box {
    background: #161208; border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid rgba(245,158,11,.16);
    border-left: 3px solid #f59e0b;
  }
  .injury-eyebrow { font-size: 9px; font-family: monospace; letter-spacing: 2px; color: rgba(245,158,11,.5); margin-bottom: 6px; }
  .injury-tip-text { font-size: 13px; color: #c9a555; line-height: 1.55; }
  #modal-close {
    width: 100%; margin-top: 20px; padding: 13px;
    background: #1a1a28; border: 1px solid #2a2a3a;
    border-radius: 10px; color: #555;
    font-size: 11px; letter-spacing: 2px;
  }
  #modal-no-guide { text-align: center; color: #555; font-size: 13px; padding: 24px; }

  /* ── Main nav tabs ── */
  #main-nav {
    display: flex; gap: 0;
    border-bottom: 1px solid #1e1e2e;
    background: #0a0a0f;
    position: sticky; top: 0; z-index: 50;
  }
  .main-tab {
    flex: 1; padding: 12px 6px;
    font-size: 10px; letter-spacing: 2px;
    font-family: monospace; font-weight: 700;
    background: transparent; color: #444;
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .main-tab.active { color: #e8e8f0; border-bottom-color: #e8e8f0; }

  /* ── Weight Log view ── */
  #weightlog-view { display: none; padding: 0 0 60px; }
  #weightlog-view.visible { display: block; }
  #workout-view.hidden { display: none; }

  /* Log header */
  #wl-header {
    padding: 16px 20px 12px;
    background: linear-gradient(135deg,#0f0f1a,#1a1025);
    border-bottom: 1px solid #1e1e2e;
  }
  #wl-title { font-size: 18px; font-weight: 400; color: #f0f0ff; margin-bottom: 4px; }
  #wl-sub { font-size: 10px; color: #444; font-family: monospace; letter-spacing: 1.5px; }

  /* Week selector */
  #wl-week-row {
    padding: 12px 20px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #1e1e2e;
    background: #0d0d16;
  }
  #wl-week-label { font-size: 10px; color: #555; font-family: monospace; letter-spacing: 1.5px; flex-shrink: 0; }
  #wl-week-select {
    flex: 1; background: #111118; color: #e8e8f0;
    border: 1px solid #2a2a3a; border-radius: 8px;
    padding: 7px 10px; font-family: monospace; font-size: 12px;
  }
  #wl-week-select:focus { outline: none; border-color: #4a4a6a; }

  /* Day filter */
  #wl-day-row {
    padding: 10px 20px;
    display: flex; gap: 6px; overflow-x: auto;
    border-bottom: 1px solid #1e1e2e;
    background: #0a0a0f;
  }
  .wl-day-btn {
    flex: 0 0 auto; padding: 6px 14px;
    border-radius: 20px; font-size: 10px;
    font-family: monospace; letter-spacing: 1px;
    background: #111118; color: #555;
    border: 1px solid #1e1e2e;
    transition: all .15s;
  }
  .wl-day-btn.active { color: #000; font-weight: 700; }

  /* Exercise log cards */
  #wl-exercises { padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; }

  .wl-card {
    background: #0f0f18;
    border: 1px solid #1a1a28;
    border-radius: 12px;
    overflow: hidden;
  }
  .wl-card-header {
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .wl-card-name { flex: 1; font-size: 13px; font-weight: 600; color: #ddd; line-height: 1.3; }
  .wl-card-latest { font-size: 11px; font-family: monospace; color: #555; flex-shrink: 0; }
  .wl-card-arrow { font-size: 10px; color: #444; flex-shrink: 0; transition: transform .2s; }
  .wl-card-arrow.open { transform: rotate(180deg); }

  .wl-card-body { display: none; padding: 0 14px 14px; }
  .wl-card-body.open { display: block; }

  /* Sets/reps reference */
  .wl-ref {
    font-size: 10px; color: #4a4a6a; font-family: monospace;
    margin-bottom: 10px; padding: 5px 8px;
    background: #0d0d16; border-radius: 6px;
    border-left: 2px solid #2a2a3a;
  }

  /* Input row */
  .wl-input-row {
    display: grid; grid-template-columns: 1fr 1fr auto;
    gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .wl-input-label { font-size: 9px; color: #444; font-family: monospace; letter-spacing: 1px; margin-bottom: 3px; }
  .wl-input {
    width: 100%; background: #111118; color: #e8e8f0;
    border: 1px solid #2a2a3a; border-radius: 8px;
    padding: 8px 10px; font-family: monospace; font-size: 13px;
    transition: border-color .15s;
  }
  .wl-input:focus { outline: none; border-color: #4ade80; }
  .wl-input::placeholder { color: #333; }
  .wl-save-btn {
    padding: 8px 14px; border-radius: 8px;
    font-size: 10px; letter-spacing: 1px; font-weight: 700;
    color: #000; margin-top: 16px;
    transition: opacity .15s; align-self: end;
  }
  .wl-save-btn:hover { opacity: .85; }

  /* History mini-table */
  .wl-history { margin-top: 10px; }
  .wl-history-label {
    font-size: 9px; color: #333; font-family: monospace;
    letter-spacing: 2px; margin-bottom: 6px;
  }
  .wl-history-row {
    display: flex; gap: 8px; padding: 5px 0;
    border-bottom: 1px solid #111120; align-items: center;
    font-family: monospace; font-size: 11px;
  }
  .wl-history-row:last-child { border-bottom: none; }
  .wl-hist-week { color: #555; width: 52px; flex-shrink: 0; }
  .wl-hist-weight { color: #bbb; flex: 1; }
  .wl-hist-notes { color: #444; flex: 2; font-size: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .wl-hist-del { color: #333; cursor: pointer; padding: 0 4px; font-size: 12px; }
  .wl-hist-del:hover { color: #f87171; }

  /* Progress bar spark */
  .wl-progress-bar {
    height: 3px; border-radius: 2px; margin-top: 8px;
    background: #111120; overflow: hidden;
  }
  .wl-progress-fill { height: 100%; border-radius: 2px; transition: width .4s; }

  /* Empty state */
  .wl-empty {
    text-align: center; padding: 40px 20px;
    color: #333; font-family: monospace; font-size: 12px; letter-spacing: 1px;
  }

  /* Stats summary bar */
  #wl-stats {
    margin: 0 20px 8px;
    background: #0d0d16; border: 1px solid #1e1e2e;
    border-radius: 10px; padding: 10px 14px;
    display: flex; gap: 20px;
  }
  .wl-stat { text-align: center; flex: 1; }
  .wl-stat-val { font-size: 18px; font-family: monospace; font-weight: 700; color: #e8e8f0; }
  .wl-stat-lbl { font-size: 8px; color: #444; letter-spacing: 1.5px; margin-top: 2px; }

  /* Clear data btn */
  #wl-clear-row { padding: 16px 20px 0; text-align: center; }
  #wl-clear-btn {
    font-size: 9px; color: #333; font-family: monospace;
    letter-spacing: 1.5px; background: transparent;
    border: 1px dashed #222; border-radius: 6px;
    padding: 6px 14px; cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  #wl-clear-btn:hover { color: #f87171; border-color: #f8717144; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="header-bg"></div>
  <div id="header-content">
    <div id="header-eyebrow">12-Week Program</div>
    <h1>Home Strength &<br><em id="plan-color-title">Toning Plan</em></h1>
    <div id="header-stats">
      <div class="stat"><span class="stat-label">GOAL</span><span class="stat-val">Toned</span></div>
      <div class="stat"><span class="stat-label">DAYS/WK</span><span class="stat-val">4</span></div>
      <div class="stat"><span class="stat-label">DURATION</span><span class="stat-val">12 Wks</span></div>
    </div>
  </div>
</div>

<!-- Main nav -->
<div id="main-nav">
  <button class="main-tab active" onclick="switchView('workout')">📋 WORKOUT</button>
  <button class="main-tab" onclick="switchView('weightlog')">📊 WEIGHT LOG</button>
</div>

<!-- Workout view wrapper -->
<div id="workout-view">

<!-- Week schedule bar -->
<div id="week-bar"></div>

<!-- Phase tabs -->
<div id="phase-tabs"></div>

<!-- Focus bar -->
<div id="focus-bar">
  <div id="focus-inner">
    <span class="focus-key" id="focus-key"></span>
    <span class="focus-val" id="focus-val"></span>
  </div>
</div>

<!-- Day tabs -->
<div id="day-tabs"></div>

<!-- Day content -->
<div id="day-content">
  <div id="day-header">
    <h2 id="day-title"></h2>
    <div id="day-header-sub">TAP ANY EXERCISE FOR DEMO + GUIDE</div>
    <div id="day-equipment"></div>
  </div>
  <div id="exercise-list"></div>
  <button id="injury-toggle">
    <span>⚠ INJURY NOTES &amp; TIPS</span><span id="injury-caret">▼</span>
  </button>
  <div id="injury-notes"></div>
</div>


</div><!-- end #workout-view -->

<!-- Weight Log view -->
<div id="weightlog-view">
  <div id="wl-header">
    <div id="wl-title">Weight Log</div>
    <div id="wl-sub">TRACK YOUR LIFTS — STORED LOCALLY IN THIS BROWSER</div>
  </div>

  <!-- Week selector -->
  <div id="wl-week-row">
    <span id="wl-week-label">WEEK</span>
    <select id="wl-week-select"></select>
  </div>

  <!-- Day filter tabs -->
  <div id="wl-day-row"></div>

  <!-- Stats bar -->
  <div style="padding:12px 20px 0">
    <div id="wl-stats">
      <div class="wl-stat"><div class="wl-stat-val" id="wls-entries">0</div><div class="wl-stat-lbl">ENTRIES</div></div>
      <div class="wl-stat"><div class="wl-stat-val" id="wls-exercises">0</div><div class="wl-stat-lbl">EXERCISES</div></div>
      <div class="wl-stat"><div class="wl-stat-val" id="wls-weeks">0</div><div class="wl-stat-lbl">WKS LOGGED</div></div>
    </div>
  </div>

  <!-- Exercise cards -->
  <div id="wl-exercises"></div>

  <!-- Clear data -->
  <div id="wl-clear-row">
    <button id="wl-clear-btn" onclick="clearAllData()">⚠ CLEAR ALL LOG DATA</button>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal-panel">
    <div id="modal-drag"></div>
    <div id="modal-top">
      <div id="modal-anim-box">
        <svg id="modal-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div>
        <div id="modal-eyebrow">EXERCISE GUIDE</div>
        <div id="modal-title"></div>
        <div id="modal-sets"></div>
        <div id="modal-exnotes"></div>
      </div>
    </div>
    <div id="modal-body"></div>
    <button id="modal-close">CLOSE</button>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const GUIDES = {
  "Flat DB Bench Press": {
    muscles: ["Chest","Front Delts","Triceps"],
    setup: "Lie flat on the bench, feet firmly on the floor. Hold dumbbells at chest level with palms facing forward, elbows at ~45° from your torso.",
    steps: ["Brace your core and retract your shoulder blades into the bench.","Press the dumbbells up and slightly together until arms are fully extended.","Lower slowly over 2–3 seconds until dumbbells reach chest level.","Pause briefly at the bottom, then drive back up powerfully."],
    formCues: ["Keep wrists stacked directly over elbows throughout","Maintain a slight natural arch in your lower back","Drive your feet into the floor for stability"],
    avoid: ["Flaring elbows out to 90° — keep them at 45° to protect shoulders","Bouncing the weight off your chest — control the descent"],
    injuryTip: "Keep feet flat and firmly planted. This stabilizes your lower back and prevents excessive arching. If back tightens, place feet on the bench."
  },
  "Incline DB Press": {
    muscles: ["Upper Chest","Front Delts","Triceps"],
    setup: "Set bench to 30–45°. Sit back with dumbbells resting on thighs, then kick them up as you lean back. Start with dumbbells at shoulder level, palms forward.",
    steps: ["Retract shoulder blades and press them into the pad.","Press dumbbells up and slightly inward in an arc motion.","Lower with control over 2–3 seconds back to shoulder height.","Keep chest tall throughout — don't let shoulders round forward."],
    formCues: ["Lead with your chest, not your shoulders","Keep elbows at 45°, not flared wide","Squeeze the chest at the top of each rep"],
    avoid: ["Setting the incline too steep (above 45°) — shifts load to shoulders","Losing shoulder blade retraction at the bottom of the rep"],
    injuryTip: "The incline reduces lower back strain vs flat bench. Keep your back pressed into the pad and avoid overarching."
  },
  "DB Shoulder Press": {
    muscles: ["Medial Delts","Front Delts","Triceps","Upper Traps"],

// ─── STATE ────────────────────────────────────────────────────────────────────
let activePhase = 0;
let activeDay = 0;
let showOverview = false;
let selectedEx = null;
let animFrame = 0;
let animInterval = null;

function getAnimType(name) {
  const n = name.toLowerCase();
  if (n.includes("squat") || n.includes("goblet") || n.includes("thruster")) return "squat";
  if (n.includes("deadlift") || n.includes("rdl")) return "hinge";
  if (n.includes("lunge")) return "lunge";
  if (n.includes("row") && !n.includes("ski")) return "row";
  if (n.includes("press") || n.includes("dip") || n.includes("fly")) return "press";
  if (n.includes("curl") || n.includes("pull")) return "curl";
  if (n.includes("plank") || n.includes("dead bug") || n.includes("bridge") || n.includes("sit") || n.includes("donkey") || n.includes("hydrant") || n.includes("copenhagen") || n.includes("march")) return "core";
  if (n.includes("bike") || n.includes("ski") || n.includes("cardio") || n.includes("warm-up")) return "cardio";
  return "generic";
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function renderWeekBar() {
  const bar = document.getElementById('week-bar');
  bar.innerHTML = weekSchedule.map(d => {
    const isRest = d.type.includes("Rest");
    return `<div class="week-cell" style="background:${isRest ? 'transparent' : 'rgba(255,255,255,.04)'}; border:${isRest ? '1px dashed #222' : '1px solid #222'}">
      <div class="week-label">${d.week.toUpperCase()}</div>
      <div class="week-type" style="color:${isRest ? '#3a3a4a' : '#aaa'}">${d.type==='Rest/Cardio' ? '🚴' : d.type==='Rest' ? '—' : 'Day '+d.type}</div>
    </div>`;
  }).join('');
}

function renderPhaseTabs() {
  const container = document.getElementById('phase-tabs');
  container.innerHTML = plan.phases.map((p, i) => {

    return `<button class="phase-tab${active?' active':''}"
      style="background:${active ? p.color : '#111118'}; color:${active ? '#000' : '#555'}; border-top:2px solid ${active ? p.color : '#1e1e2e'}"

}

function renderFocusBar() {

function renderDayTabs() {

function renderDay() {
  const phase = plan.phases[activePhase];
  const day = phase.days[activeDay];

  document.getElementById('day-title').innerHTML = `${day.day}: <em style="color:${phase.color}">${day.title}</em>`;
  document.getElementById('day-equipment').innerHTML = day.equipment.map(eq => `<span class="eq-tag">${eq}</span>`).join('');

  const list = document.getElementById('exercise-list');
  list.innerHTML = day.exercises.map(ex => {
    const isHeader = ex.sets === "" && ex.reps === "";

    const tappable = !isHeader && hasGuide;

      return `<div class="ex-row header-row">

          <div class="meta-block"><div class="meta-rep">${ex.reps}</div><div class="meta-lbl">REPS</div></div>
        </div>` : ''}

  }).join('');

// ─── MODAL ────────────────────────────────────────────────────────────────────

function openModal(name, sets, reps, notes) {
  const phase = plan.phases[activePhase];
  const guide = GUIDES[name];
  selectedEx = { name, sets, reps, notes };

  // Update modal panel border color
  document.getElementById('modal-panel').style.borderTopColor = phase.color;

  // Anim box border
  document.getElementById('modal-anim-box').style.borderColor = phase.color + '30';

  // Set SVG color
  const svg = document.getElementById('modal-svg');
  svg.style.color = phase.color;
  const type = getAnimType(name);
  const frames = ANIM_SVG[type] || ANIM_SVG.generic;
  svg.innerHTML = frames[0];

  // Start animation
  if (animInterval) clearInterval(animInterval);
  let f = 0;
  animInterval = setInterval(() => {
    f = (f + 1) % 2;
    svg.innerHTML = frames[f];
  }, 850);

  // Header
  document.getElementById('modal-eyebrow').style.color = phase.color;
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-sets').textContent = sets && reps ? `${sets} sets · ${reps} reps` : '';
  document.getElementById('modal-exnotes').textContent = notes || '';

  // Body
  const body = document.getElementById('modal-body');
  if (!guide) {
    body.innerHTML = `<div id="modal-no-guide">No guide available for this exercise.</div>`;
  } else {
    body.innerHTML = `
      <div>
        <div class="modal-section-label">MUSCLES TARGETED</div>
        <div class="muscle-tags">${guide.muscles.map(m => `<span class="muscle-tag" style="background:${phase.color}16; border-color:${phase.color}38; color:${phase.color}">${m}</span>`).join('')}</div>
      </div>
      <div class="setup-box" style="border-left-color:${phase.color}">
        <div class="modal-section-label">STARTING POSITION</div>
        <div class="setup-text">${guide.setup}</div>
      </div>
      <div>
        <div class="modal-section-label">HOW TO PERFORM</div>
        <div class="steps-list">${guide.steps.map((s,i) => `
          <div class="step-row">
            <div class="step-num" style="background:${phase.color}18; border-color:${phase.color}45; color:${phase.color}">${i+1}</div>
            <div class="step-text">${s}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="form-box">
        <div class="modal-section-label">FORM CUES</div>
        ${guide.formCues.map(c => `<div class="form-row"><span class="check-icon" style="color:${phase.color}">✓</span><span class="cue-text">${c}</span></div>`).join('')}
      </div>
      <div class="avoid-box">
        <div class="modal-section-label">COMMON MISTAKES</div>
        ${guide.avoid.map(m => `<div class="avoid-row"><span class="x-icon">✕</span><span class="cue-text">${m}</span></div>`).join('')}
      </div>
      <div class="injury-box">
        <div class="injury-eyebrow">⚠ INJURY MODIFICATION</div>
        <div class="injury-tip-text">${guide.injuryTip}</div>
      </div>`;
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  if (animInterval) { clearInterval(animInterval); animInterval = null; }
  selectedEx = null;
}

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('modal-close').addEventListener('click', closeModal);

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderWeekBar();

renderAll();
// ─── VIEW SWITCHING ───────────────────────────────────────────────────────────
let currentView = 'workout';

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.main-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && view === 'workout') || (i === 1 && view === 'weightlog'));

// ─── WEIGHT LOG DATA ──────────────────────────────────────────────────────────
// Storage key: 'wl_data'
// Structure: { "Phase1_DayA_Week1_ExerciseName": { weight: "45", notes: "felt strong" } }

function wlKey(phase, day, week, exName) {
  return `wl_${phase}_${day}_${week}_${exName.replace(/\s+/g,'_')}`;
}

function wlLoad() {
  try { return JSON.parse(localStorage.getItem('wl_data') || '{}'); } catch { return {}; }
}
function wlSave(data) {
  localStorage.setItem('wl_data', JSON.stringify(data));
}

function saveEntry(phaseIdx, dayIdx, week, exName, weight, notes) {
  const data = wlLoad();
  const k = wlKey(phaseIdx, dayIdx, week, exName);
  data[k] = { weight, notes, saved: new Date().toISOString() };
  wlSave(data);
}

function deleteEntry(phaseIdx, dayIdx, week, exName) {
  const data = wlLoad();
  delete data[wlKey(phaseIdx, dayIdx, week, exName)];
  wlSave(data);
}

function getEntry(phaseIdx, dayIdx, week, exName) {
  return wlLoad()[wlKey(phaseIdx, dayIdx, week, exName)] || null;
}

function getAllEntriesForExercise(phaseIdx, dayIdx, exName) {
  const data = wlLoad();
  const prefix = `wl_${phaseIdx}_${dayIdx}_`;
  const safeName = exName.replace(/\s+/g,'_');
  const entries = [];
  for (const [k, v] of Object.entries(data)) {
    if (k.startsWith(prefix) && k.endsWith('_' + safeName)) {
      const week = k.slice(prefix.length, k.length - safeName.length - 1);
      entries.push({ week, ...v });
    }
  }
  entries.sort((a,b) => parseInt(a.week) - parseInt(b.week));
  return entries;
}

// ─── WEIGHT LOG RENDER ────────────────────────────────────────────────────────
let wlPhase = 0;
let wlDay = 0;
let wlWeek = 1;
let openCards = new Set();

function renderWeightLog() {
  renderWlWeekSelect();
  renderWlDayTabs();
  renderWlExercises();
  renderWlStats();
}

function renderWlWeekSelect() {
  const sel = document.getElementById('wl-week-select');
  sel.innerHTML = Array.from({length:12}, (_,i) => {
    const w = i+1;
    const phaseLabel = w <= 4 ? 'Phase 1 — Foundation' : w <= 8 ? 'Phase 2 — Build' : 'Phase 3 — Peak Tone';
    return `<option value="${w}" ${w === wlWeek ? 'selected' : ''}>Week ${w} · ${phaseLabel}</option>`;
  }).join('');
  sel.onchange = () => { wlWeek = parseInt(sel.value); renderWlExercises(); renderWlStats(); };
}

function renderWlDayTabs() {
  const phase = plan.phases[wlPhase];
  const container = document.getElementById('wl-day-row');
  // Phase tabs first
  container.innerHTML =
    plan.phases.map((p,i) => `<button class="wl-day-btn${i===wlPhase?' active':''}" style="${i===wlPhase?`background:${p.color};border-color:${p.color};`:''}" onclick="wlSelectPhase(${i})">${p.label}</button>`).join('') +
    '<span style="width:1px;background:#2a2a3a;margin:4px 2px;flex-shrink:0"></span>' +
    phase.days.map((d,i) => `<button class="wl-day-btn${i===wlDay?' active':''}" style="${i===wlDay?`background:${phase.color}18;border-color:${phase.color};color:${phase.color}`:''}" onclick="wlSelectDay(${i})">${d.day}</button>`).join('');
}

function wlSelectPhase(i) { wlPhase = i; wlDay = 0; openCards.clear(); renderWlDayTabs(); renderWlExercises(); }
function wlSelectDay(i) { wlDay = i; openCards.clear(); renderWlExercises(); }

function renderWlExercises() {
  const phase = plan.phases[wlPhase];
  const day = phase.days[wlDay];
  const color = phase.color;
  const container = document.getElementById('wl-exercises');

  // Only exercises with actual sets/reps (not headers or rest notes)
  const logable = day.exercises.filter(ex => ex.sets && ex.reps && ex.sets !== '' && ex.reps !== '');

  if (!logable.length) {
    container.innerHTML = `<div class="wl-empty">NO LOGGABLE EXERCISES ON THIS DAY</div>`;
    return;
  }

  container.innerHTML = logable.map((ex, idx) => {
    const history = getAllEntriesForExercise(wlPhase, wlDay, ex.name);
    const current = getEntry(wlPhase, wlDay, wlWeek, ex.name);
    const isOpen = openCards.has(idx);
    const latestWeight = history.length ? history[history.length-1].weight + ' lbs' : '—';

    // Progress: max weight across all entries
    const weights = history.map(h => parseFloat(h.weight)).filter(n => !isNaN(n));
    const maxW = weights.length ? Math.max(...weights) : 0;
    const firstW = weights.length ? weights[0] : 0;
    const progressPct = maxW && firstW ? Math.min(100, ((maxW - firstW) / (firstW || 1)) * 300 + 20) : 0;

    return `<div class="wl-card" id="wlcard-${idx}">
      <div class="wl-card-header" onclick="toggleCard(${idx})">
        <div class="wl-card-name" style="color:${history.length ? '#ddd' : '#666'}">${ex.name.replace('→ ','')}</div>
        <div class="wl-card-latest" style="color:${current ? color : '#555'}">${current ? current.weight + ' lbs' : latestWeight}</div>
        <div class="wl-card-arrow${isOpen?' open':''}">▼</div>
      </div>
      ${history.length ? `<div class="wl-progress-bar" style="margin:0 14px"><div class="wl-progress-fill" style="width:${progressPct}%;background:${color}"></div></div>` : ''}
      <div class="wl-card-body${isOpen?' open':''}" id="wlbody-${idx}">
        <div class="wl-ref">${ex.sets} sets · ${ex.reps} reps${ex.notes ? ' · ' + ex.notes : ''}</div>
        <div class="wl-input-row">
          <div>
            <div class="wl-input-label">WEIGHT (LBS)</div>
            <input class="wl-input" id="wl-weight-${idx}" type="number" step="2.5" min="0" placeholder="e.g. 35" value="${current ? current.weight : ''}">
          </div>
          <div>
            <div class="wl-input-label">NOTES</div>
            <input class="wl-input" id="wl-notes-${idx}" type="text" placeholder="felt strong, etc." value="${current ? current.notes : ''}">
          </div>
          <button class="wl-save-btn" style="background:${color}" onclick="saveWlEntry(${idx},'${ex.name.replace(/'/g,"\\'")}')">SAVE</button>
        </div>
        ${history.length ? `
        <div class="wl-history">
          <div class="wl-history-label">HISTORY</div>
          ${history.map(h => `
            <div class="wl-history-row">
              <span class="wl-hist-week">WK ${h.week}</span>
              <span class="wl-hist-weight" style="color:${color}">${h.weight} lbs</span>
              <span class="wl-hist-notes">${h.notes || '—'}</span>
              <span class="wl-hist-del" onclick="deleteWlEntry(${idx},'${ex.name.replace(/'/g,"\\'")}','${h.week}')">✕</span>
            </div>`).join('')}
        </div>` : '<div style="font-size:11px;color:#333;font-family:monospace;margin-top:6px">No history yet — log your first set above.</div>'}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(idx) {
  if (openCards.has(idx)) openCards.delete(idx);
  else openCards.add(idx);
  const body = document.getElementById(`wlbody-${idx}`);
  const arrow = document.querySelector(`#wlcard-${idx} .wl-card-arrow`);
  if (body) body.classList.toggle('open', openCards.has(idx));
  if (arrow) arrow.classList.toggle('open', openCards.has(idx));
}

function saveWlEntry(idx, exName) {
  const weight = document.getElementById(`wl-weight-${idx}`).value.trim();
  const notes = document.getElementById(`wl-notes-${idx}`).value.trim();
  if (!weight) { alert('Please enter a weight.'); return; }
  saveEntry(wlPhase, wlDay, wlWeek, exName, weight, notes);
  renderWlExercises();
  renderWlStats();
  // Keep card open after save
  openCards.add(idx);
  const body = document.getElementById(`wlbody-${idx}`);
  const arrow = document.querySelector(`#wlcard-${idx} .wl-card-arrow`);
  if (body) body.classList.add('open');
  if (arrow) arrow.classList.add('open');
}

function deleteWlEntry(idx, exName, week) {
  if (!confirm(`Delete Week ${week} entry for "${exName}"?`)) return;
  deleteEntry(wlPhase, wlDay, week, exName);
  renderWlExercises();
  renderWlStats();
  openCards.add(idx);
}

function renderWlStats() {
  const data = wlLoad();
  const keys = Object.keys(data);
  const weeks = new Set(keys.map(k => { const parts = k.split('_'); return parts[3]; }));
  const exercises = new Set(keys.map(k => k.split('_').slice(4).join('_')));
  document.getElementById('wls-entries').textContent = keys.length;
  document.getElementById('wls-exercises').textContent = exercises.size;
  document.getElementById('wls-weeks').textContent = weeks.size;
}

function clearAllData() {
  if (!confirm('Clear ALL weight log data? This cannot be undone.')) return;
  localStorage.removeItem('wl_data');
  renderWlExercises();
  renderWlStats();
}
